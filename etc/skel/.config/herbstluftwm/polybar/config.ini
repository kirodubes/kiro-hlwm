; =============================================================================
; polybar — herbstluftwm edition (Kiro)
; Self-contained: launched by ../autostart via launch.sh, one bar per monitor.
; The herbstluftwm/tags module is driven by scripts/herbstclient-tags.sh.
; =============================================================================

[colors]
background     = #ee2e3440
background-alt = #3b4252
foreground     = #e5e9f0
primary        = #88c0d0
secondary      = #81a1c1
alert          = #bf616a
disabled       = #4c566a

[bar/main]
width        = 100%
height       = 28pt
radius       = 0
background    = ${colors.background}
foreground    = ${colors.foreground}
line-size     = 3pt
border-size   = 0pt
padding-left  = 1
padding-right = 2
module-margin = 1
separator     = %{F#4c566a}|%{F-}

font-0 = JetBrainsMono Nerd Font:size=10;3
font-1 = JetBrainsMono Nerd Font:size=13;3

modules-left   = herbstluftwm-tags
modules-center = title
modules-right  = pulseaudio memory cpu date systray

cursor-click  = pointer
enable-ipc    = true
wm-restack    = generic

[module/herbstluftwm-tags]
; Tags for monitor 0. Multi-monitor per-bar tags would need one module per
; monitor index; monitor 0 is the sensible single-bar default.
type = custom/script
exec = ~/.config/herbstluftwm/polybar/scripts/herbstclient-tags.sh 0
tail = true

[module/title]
type = internal/xwindow
label = %title:0:80:…%
label-foreground = ${colors.secondary}

[module/systray]
type = internal/tray
format-margin = 6pt
tray-spacing  = 6pt

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "  "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = " muted"
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 3
format-prefix = "  "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 3
format-prefix = "  "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/date]
type = internal/date
interval = 1
date = %a %d %b
time = %H:%M
label = %date%  %time%
format-prefix = "  "
format-prefix-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true
